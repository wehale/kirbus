<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kirbus dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    color: #00ff88;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc44;
  }
  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 24px;
    font-size: 0.85rem;
  }
  .server-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .server-bar input {
    background: #111;
    border: 1px solid #333;
    color: #00ff88;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 0.9rem;
    width: 300px;
    border-radius: 4px;
  }
  .server-bar button {
    background: #00ff8822;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 6px 16px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 4px;
  }
  .server-bar button:hover { background: #00ff8844; }
  .status {
    text-align: center;
    font-size: 0.8rem;
    margin-bottom: 20px;
  }
  .status.ok { color: #00ff88; }
  .status.err { color: #ff4444; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 0 auto 24px;
  }
  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .card .value {
    font-size: 2.2rem;
    font-weight: bold;
    color: #00ffcc;
    text-shadow: 0 0 8px #00ffcc44;
  }
  .card .label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .card.alert .value { color: #ff4444; }

  .chart-container {
    max-width: 900px;
    margin: 0 auto 24px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
  }
  .chart-container h2 {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .table-container {
    max-width: 900px;
    margin: 0 auto;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }
  .table-container h2 {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    color: #00ffcc;
    border-bottom: 1px solid #333;
    padding: 6px 8px;
  }
  td {
    padding: 5px 8px;
    border-bottom: 1px solid #1a1a1a;
    color: #aaa;
  }
  tr:hover td { color: #00ff88; background: #0a0a0a; }
</style>
</head>
<body>

<h1>kirbus dashboard</h1>
<p class="subtitle">server metrics &amp; connection monitor</p>

<div class="server-bar">
  <input id="server-url" type="text" placeholder="http://192.168.50.18:8000" />
  <button onclick="addServer()">Add Server</button>
</div>

<div id="status" class="status">connecting...</div>

<div class="cards" id="cards">
  <div class="card"><div class="value" id="online">-</div><div class="label">Online Now</div></div>
  <div class="card"><div class="value" id="total">-</div><div class="label">Total Connections</div></div>
  <div class="card"><div class="value" id="unique-users">-</div><div class="label">Unique Users</div></div>
  <div class="card"><div class="value" id="unique-ips">-</div><div class="label">Unique IPs</div></div>
  <div class="card alert"><div class="value" id="failed">-</div><div class="label">Failed Auth</div></div>
</div>

<div class="chart-container">
  <h2>Connections Over Time</h2>
  <canvas id="timeline-chart" height="200"></canvas>
</div>

<div class="table-container">
  <h2>Recent Connections</h2>
  <table>
    <thead><tr><th>Time</th><th>Handle</th><th>IP</th><th>Server</th></tr></thead>
    <tbody id="connections-body"></tbody>
  </table>
</div>

<script>
const servers = [];
let allRecent = [];
let timelineChart = null;
const connectionTimeline = []; // {time, count} buckets

function addServer() {
  const input = document.getElementById('server-url');
  let url = input.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'http://' + url;
  url = url.replace(/\/+$/, '');
  if (!servers.includes(url)) {
    servers.push(url);
    input.value = '';
    poll();
  }
}

// Auto-add from URL params or default
const params = new URLSearchParams(window.location.search);
const initServers = params.get('servers');
if (initServers) {
  initServers.split(',').forEach(s => {
    servers.push(s.trim().replace(/\/+$/, ''));
  });
} else {
  servers.push('http://192.168.50.18:8000');
}

async function fetchStats(url) {
  try {
    const resp = await fetch(url + '/stats', { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    data._server = url;
    return data;
  } catch (e) {
    return { _server: url, _error: e.message };
  }
}

function updateCards(combined) {
  document.getElementById('online').textContent = combined.online;
  document.getElementById('total').textContent = combined.total;
  document.getElementById('unique-users').textContent = combined.uniqueUsers;
  document.getElementById('unique-ips').textContent = combined.uniqueIps;
  document.getElementById('failed').textContent = combined.failed;
}

function updateTable(recent) {
  const tbody = document.getElementById('connections-body');
  tbody.innerHTML = '';
  recent.slice().reverse().forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.time || ''}</td><td>${r.handle || ''}</td><td>${r.ip || ''}</td><td>${r._server || ''}</td>`;
    tbody.appendChild(tr);
  });
}

function updateTimeline(total) {
  const now = new Date();
  const label = now.toLocaleTimeString();
  connectionTimeline.push({ label, total });
  if (connectionTimeline.length > 60) connectionTimeline.shift(); // keep 60 data points

  if (!timelineChart) {
    const ctx = document.getElementById('timeline-chart').getContext('2d');
    timelineChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: connectionTimeline.map(d => d.label),
        datasets: [{
          label: 'Total Connections',
          data: connectionTimeline.map(d => d.total),
          borderColor: '#00ffcc',
          backgroundColor: '#00ffcc22',
          fill: true,
          tension: 0.3,
          pointRadius: 0,
        }]
      },
      options: {
        animation: false,
        scales: {
          x: {
            ticks: { color: '#555', maxTicksLimit: 10 },
            grid: { color: '#1a1a1a' },
          },
          y: {
            ticks: { color: '#555' },
            grid: { color: '#1a1a1a' },
            beginAtZero: true,
          }
        },
        plugins: {
          legend: { display: false },
        }
      }
    });
  } else {
    timelineChart.data.labels = connectionTimeline.map(d => d.label);
    timelineChart.data.datasets[0].data = connectionTimeline.map(d => d.total);
    timelineChart.update();
  }
}

async function poll() {
  const results = await Promise.all(servers.map(fetchStats));
  const ok = results.filter(r => !r._error);
  const errors = results.filter(r => r._error);

  if (ok.length === 0) {
    document.getElementById('status').className = 'status err';
    document.getElementById('status').textContent = `no servers reachable (${errors.map(e => e._server).join(', ')})`;
    return;
  }

  const serverNames = ok.map(r => {
    const u = new URL(r._server);
    return u.host;
  });
  document.getElementById('status').className = 'status ok';
  document.getElementById('status').textContent = `connected to ${serverNames.join(', ')} | polling every 10s`;

  const combined = {
    online: ok.reduce((s, r) => s + (r.currently_online || 0), 0),
    total: ok.reduce((s, r) => s + (r.total_connections || 0), 0),
    uniqueUsers: ok.reduce((s, r) => s + (r.unique_handles || 0), 0),
    uniqueIps: ok.reduce((s, r) => s + (r.unique_ips || 0), 0),
    failed: ok.reduce((s, r) => s + (r.failed_auth || 0), 0),
  };

  updateCards(combined);

  // Merge recent connections from all servers
  allRecent = [];
  ok.forEach(r => {
    (r.recent || []).forEach(c => {
      allRecent.push({ ...c, _server: new URL(r._server).host });
    });
  });
  allRecent.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  updateTable(allRecent);
  updateTimeline(combined.total);
}

// Initial poll + interval
poll();
setInterval(poll, 10000);
</script>

</body>
</html>
